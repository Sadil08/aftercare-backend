spring.application.name=aftercare-portal

# ──── Server ────
server.port=8080

# ──── PostgreSQL Datasource ────
spring.datasource.url=jdbc:postgresql://localhost:5432/aftercare
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ──── JPA / Hibernate ────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ──── JWT ────
app.jwt.secret=aftercare-portal-dev-secret-key-change-in-production-minimum-256-bits
app.jwt.expiration-ms=86400000

# ──── Logging ────
logging.level.com.aftercare=DEBUG
